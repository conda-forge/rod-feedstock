{% set name = "rod" %}
{% set version = "0.4.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rod-{{ version }}.tar.gz
  sha256: 34f8a69f92eb4398e20dc7ba6d97a5533d11e6b6e17579bebe950bee13218ec0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - wheel
    - setuptools >=60
    - setuptools-scm >=8
    - pip
  run:
    - trimesh
    - resolve-robotics-uri-py
    - python >={{ python_min }}
    - coloredlogs
    - gz-tools2
    - libsdformat13
    - mashumaro
    - numpy
    - packaging
    - scipy
    - xmltodict

test:
  imports:
    - rod
  commands:
    - pip check
    - pytest -vv --pyargs rod tests/
  source_files:
    - tests/*
  requires:
    - python {{ python_min }}
    - git
    - idyntree >=12.4
    - pip
    - pytest
    - robot_descriptions

about:
  home: https://github.com/ami-iit/rod
  summary: The ultimate Python tool for RObot Descriptions processing.
  dev_url: https://github.com/ami-iit/rod
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - diegoferigo
    - traversaro
    - flferretti
